name: Format

on:
  workflow_call:
    inputs:
      commit-message:
        type: string
        default: "Format all files correctly"
      branch:
        type: string
        default: ${{ github.head_ref }}
      command:
        type: string
        default: "format"
      turbo-cache:
        type: boolean
        default: false
      node-version-file:
        type: string
        default: ""
        description: "Node.js version file to determine the version to install"
      create-pr:
        type: boolean
        default: false
        description: "Whether to create a pull request instead of pushing directly to the branch"
      title:
        type: string
        default: "Format all files correctly"
        description: "Title for the pull request (only used when create-pr is true)"
      body:
        type: string
        default: "Formatting all files via GitHub Actions."
        description: "Body content for the pull request (only used when create-pr is true)"
    secrets:
      GH_TOKEN:
        description: "GitHub token to create the PR. Only used when create-pr is true. If not set, the default GITHUB_TOKEN will be used which will need permissions to write contents and pull-requests."
        required: false
      NPM_TOKEN:
        description: "NPM token to authenticate to a private package registry"
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.head_ref }}

      - name: Format code
        uses: markgaze/automation/format@f794b216cfcebf29cbf84ede8bf533aa6aebbeba # main
        with:
          commit-message: ${{ inputs.commit-message }}
          branch: ${{ inputs.branch }}
          command: ${{ inputs.command }}
          turbo-cache: ${{ inputs.turbo-cache }}
          node-version-file: ${{ inputs.node-version-file }}
          create-pr: ${{ inputs.create-pr }}
          title: ${{ inputs.title }}
          body: ${{ inputs.body }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
