name: Format code
description: "Format code using the specified command"

inputs:
  commit-message:
    description: "Commit message for the formatting changes"
    default: "Format all files correctly"
  branch:
    description: "Branch name for the formatting changes. When create-pr is true, this is the branch the PR will be created from."
    default: ${{ github.head_ref }}
  command:
    description: "Command to run for formatting"
    default: "format"
  turbo-cache:
    description: "Whether to use Turbo cache"
    default: "false"
  node-version-file:
    description: "Node.js version file to determine the version to install"
    default: ""
  create-pr:
    description: "Whether to create a pull request instead of pushing directly to the branch"
    default: "false"
  title:
    description: "Title for the pull request (only used when create-pr is true)"
    default: "Format all files correctly"
  body:
    description: "Body content for the pull request (only used when create-pr is true)"
    default: "Formatting all files via GitHub Actions."
  GH_TOKEN:
    description: "GitHub token to create the PR. Only used when create-pr is true. If not set, the default GITHUB_TOKEN will be used which will need permissions to write contents and pull-requests."
    required: false
  NPM_TOKEN:
    description: "NPM token to authenticate to a private package registry"
    required: false

runs:
  using: "composite"

  steps:
    - name: Setup PNPM
      uses: pnpm/action-setup@5b4374b04084dc1f9032b52464284b769ac5059e # v4

    - name: Setup Node.js
      uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
      with:
        node-version-file: ${{ inputs.node-version-file }}

    - name: Turbo Cache
      if: ${{ inputs.turbo-cache }}
      id: turbo-cache
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: .turbo
        key: turbo-${{ github.job }}-${{ github.sha }}
        restore-keys: |
          turbo-${{ github.job }}-

    - name: Install dependencies
      env:
        NODE_AUTH_TOKEN: ${{ inputs.NPM_TOKEN }}
        NPM_TOKEN: ${{ inputs.NPM_TOKEN }}
      run: pnpm install --frozen-lockfile
      shell: bash

    - name: Format code
      run: pnpm run ${{ inputs.command }}
      shell: bash

    - name: Check for changes
      id: changes
      run: |
        if git diff --quiet; then
          echo "detected=false" >> "$GITHUB_OUTPUT"
        else
          echo "detected=true" >> "$GITHUB_OUTPUT"
        fi
      shell: bash

    - name: Commit changes
      if: ${{ inputs.create-pr != 'true' && steps.changes.outputs.detected == 'true' }}
      uses: stefanzweifel/git-auto-commit-action@778341af668090896ca464160c2def5d1d1a3eb0 # v6
      with:
        commit_message: ${{ inputs.commit-message }}
        branch: ${{ inputs.branch }}

    - name: Create Pull Request
      if: ${{ inputs.create-pr == 'true' && steps.changes.outputs.detected == 'true' }}
      uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
      env:
        CI: true
      with:
        branch: ${{ inputs.branch }}
        token: ${{ inputs.GH_TOKEN || github.token }}
        commit-message: ${{ inputs.commit-message }}
        title: ${{ inputs.title }}
        body: ${{ inputs.body }}
